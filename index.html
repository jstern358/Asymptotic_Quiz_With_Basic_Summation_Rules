<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asymptotic Runtime Trainer</title>
<style>
  body { font-family: Arial; background:#f4f6f9; text-align:center; padding:20px; }
  .container {
    max-width: 750px; margin:auto; background:white;
    padding:25px; border-radius:10px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
  }
  pre {
    background:#1e1e1e; color:#00ff88;
    padding:15px; border-radius:8px; text-align:left;
  }
  button {
    width:100%; padding:12px; margin:6px 0;
    border:none; border-radius:8px; cursor:pointer;
    background:#e1e7ef; font-size:16px;
  }
  button:hover { background:#cfd8e3; }
  .correct { background:#4CAF50 !important; color:white; }
  .wrong { background:#e74c3c !important; color:white; }
  #feedback { margin-top:10px; font-size:18px; }
  #explanation {
    margin-top:20px; text-align:left;
    background:#f9fafc; padding:15px;
    border-radius:8px; display:none;
  }
</style>
</head>

<body>
<div class="container">
  <h2>Asymptotic Runtime Trainer</h2>
  <pre id="code"></pre>
  <div id="answers"></div>
  <div id="feedback"></div>
  <div id="explanation"></div>
</div>

<script>
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function triangularLoop(){
  return {
    code:`for i = 1 to n:
    for j = 1 to i:
        do O(1) work`,
    answer:"Θ(n^2)",
    choices:["Θ(n)","Θ(n^2)","Θ(n log n)","Θ(log n)"],
    explanation:`<b>Nested → multiply</b><br>
Inner cost = Θ(i)<br>
Total = Σ i = Θ(n²)<br>
Polynomial summation`
  };
}

function quadraticInner(){
  return {
    code:`for i = 1 to n:
    for j = 1 to i^2:
        do O(1) work`,
    answer:"Θ(n^3)",
    choices:["Θ(n^2)","Θ(n^3)","Θ(n log n)","Θ(n^4)"],
    explanation:`Σ i² = Θ(n³)<br>Polynomial (degree 2)`
  };
}

function logLoop(){
  return {
    code:`i = 1
while i ≤ n:
    i = 2i`,
    answer:"Θ(log n)",
    choices:["Θ(n)","Θ(log n)","Θ(n log n)","Θ(1)"],
    explanation:`Doubling → log n iterations`
  };
}

function mixed(){
  return {
    code:`for i = 1..n: O(1)
for i = 1..n:
   for j = 1..i: O(1)`,
    answer:"Θ(n^2)",
    choices:["Θ(n)","Θ(n^2)","Θ(n log n)","Θ(n^3)"],
    explanation:`Sequential → add<br>Θ(n)+Θ(n²)=Θ(n²)`
  };
}

const generators=[triangularLoop,quadraticInner,logLoop,mixed];

let current;

function newQuestion(){
  document.getElementById("feedback").innerText="";
  document.getElementById("explanation").style.display="none";

  current = generators[Math.floor(Math.random()*generators.length)]();

  document.getElementById("code").innerText=current.code;

  const answers=document.getElementById("answers");
  answers.innerHTML="";

  const choices=shuffle([...current.choices]);

  choices.forEach(choice=>{
    const btn=document.createElement("button");
    btn.innerText=choice;

    btn.onclick=()=>{
      if(choice===current.answer){
        btn.classList.add("correct");
        document.getElementById("feedback").innerText="✅ Correct!";
      } else {
        btn.classList.add("wrong");
        document.getElementById("feedback").innerText=
          "❌ Answer: "+current.answer;
      }

      const exp=document.getElementById("explanation");
      exp.innerHTML=current.explanation;
      exp.style.display="block";

      setTimeout(newQuestion,4000);
    };

    answers.appendChild(btn);
  });
}

newQuestion();
</script>
</body>
</html>
