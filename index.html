<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asymptotic Runtime Trainer</title>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Asymptotic Runtime Trainer</h1>
      <p class="subtitle">Choose the worst-case runtime in Big-Theta notation.</p>
    </header>

    <section class="controls" aria-label="Trainer settings">
      <div class="control-group">
        <label for="levelSelect"><strong>Level:</strong></label>
        <select id="levelSelect">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
        <div class="helper-text">Higher levels include more nested and mixed examples.</div>
      </div>

      <div class="control-group checkbox-group">
        <input type="checkbox" id="showBlocksToggle" />
        <label for="showBlocksToggle">Show code block numbers before answering</label>
      </div>
    </section>

    <main class="question-area">
      <section class="card">
        <div class="card-header">
          <h2>Pseudocode</h2>
          <span class="badge" id="currentLevelBadge">Level 1</span>
        </div>
        <p class="note" id="codeNote">
          Code block labels are hidden until you answer, unless you enable the checkbox above.
        </p>
        <div id="codeArea"></div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Answer Choices</h2>
        </div>
        <div id="answers"></div>
      </section>

      <section class="card">
        <div id="feedback"></div>
        <div class="button-row">
          <button id="nextBtn">Next Question</button>
        </div>
        <div id="explanation"></div>
      </section>
    </main>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
